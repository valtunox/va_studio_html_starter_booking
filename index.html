<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking · VA Studio</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <header class="header">
      <div class="brand">BookNow</div>
      <nav class="nav">
        <a href="#" class="active">Book</a>
        <a href="#">My Bookings</a>
        <a href="#">Help</a>
      </nav>
    </header>

    <section class="hero">
      <h1>Book Your Appointment</h1>
      <p class="muted">Select a service, pick a time, and confirm in seconds.</p>
    </section>

    <form class="booking-form" onsubmit="event.preventDefault(); document.querySelector('.success').style.display='flex'">
      <div class="form-group">
        <label>Service</label>
        <select>
          <option value="">Choose a service…</option>
          <option>Consultation (30 min)</option>
          <option>Strategy Session (60 min)</option>
          <option>Workshop (2 hours)</option>
          <option>Full Day Training</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" value="2026-04-10" />
        </div>
        <div class="form-group">
          <label>Time</label>
          <select>
            <option>09:00 AM</option>
            <option>10:00 AM</option>
            <option selected>11:00 AM</option>
            <option>01:00 PM</option>
            <option>02:00 PM</option>
            <option>03:00 PM</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" placeholder="John Doe" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" placeholder="john@example.com" />
        </div>
      </div>

      <div class="form-group">
        <label>Notes <span class="optional">(optional)</span></label>
        <textarea rows="3" placeholder="Anything we should know before the meeting…"></textarea>
      </div>

      <button type="submit" class="btn-primary">Confirm Booking</button>
    </form>

    <div class="success" style="display:none">
      <div class="success-icon">✓</div>
      <h2>Booking Confirmed!</h2>
      <p class="muted">A confirmation email has been sent. You can manage your booking from the dashboard.</p>
    </div>

    <footer class="footer muted">
      <p>Edit this template in VA Studio — preview updates live.</p>
    </footer>
  </main>
</body>
</html>
